spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    # Solo esquema y seed de admin; sin datos demo de dev
    locations: classpath:db/migration

  mvc:
    format:
      date: iso
      date-time: iso
      time: iso

app:
  security:
    remember-me-key: clave-solo-para-tests
