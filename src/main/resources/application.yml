spring:
  application:
    name: hotel-paraiso
  profiles:
    default: dev

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    locations: classpath:db/migration

  # Jackson 3 (Boot 4) serializa fechas en ISO-8601 por defecto
  jackson:
    time-zone: America/Bogota

  mvc:
    format:
      date: iso
      date-time: iso
      time: iso

server:
  port: 8080
