spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_paraiso}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    locations: classpath:db/migration,classpath:db/seed-dev

  thymeleaf:
    cache: false

app:
  security:
    remember-me-key: ${REMEMBER_ME_KEY:clave-dev-no-usar-en-produccion}

logging:
  level:
    com.hotel.paraiso: DEBUG
    org.hibernate.SQL: DEBUG
