<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Tabla genérica reutilizable.
    Parámetros:
      columns    : List<Map<String,String>>  con {key, label}
      rows       : List<Map<String,Object>>  con los datos de cada fila
      entityPath : String   URL base (ej: "/clientes") para los botones de acción
-->
<div th:fragment="table(columns, rows, entityPath)" class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th th:each="col : ${columns}" th:text="${col.label}">Columna</th>
                    <th class="text-end" style="width: 180px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${rows}">
                    <td th:each="col : ${columns}" th:text="${row.get(col.key)}">valor</td>
                    <td class="text-end">
                        <a th:href="@{${entityPath} + '/' + ${row.get('id')} + '/edit'}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <form th:action="@{${entityPath} + '/' + ${row.get('id')} + '/delete'}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('¿Confirma esta operación?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td th:attr="colspan=${#lists.size(columns) + 1}"
                        class="text-center text-muted py-4">
                        No hay registros para mostrar.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
