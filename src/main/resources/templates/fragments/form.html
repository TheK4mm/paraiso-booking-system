<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Formulario genérico reutilizable. Sirve tanto para crear como para editar.
    Parámetros:
      fields : List<Map<String,Object>> con {key, label, type, required, options}
      entity : Map<String,Object> con los valores actuales (null en creación)
      action : String URL a la que enviar el POST
      isEdit : Boolean indica si es edición (true) o creación (false)
-->
<form th:fragment="form(fields, entity, action, isEdit)"
      th:action="@{${action}}"
      method="post"
      class="card shadow-sm p-4">

    <input type="hidden" name="id"
           th:if="${isEdit and entity != null and entity.get('id') != null}"
           th:value="${entity.get('id')}"/>

    <div class="mb-3" th:each="field : ${fields}">
        <label th:for="${field.key}" class="form-label fw-semibold">
            <span th:text="${field.label}">Campo</span>
            <span th:if="${field.required}" class="text-danger">*</span>
        </label>

        <!-- Tipos: text, email, number, date, password -->
        <input th:if="${field.type == 'text'
                       or field.type == 'email'
                       or field.type == 'number'
                       or field.type == 'date'
                       or field.type == 'password'}"
               th:type="${field.type}"
               th:id="${field.key}"
               th:name="${field.key}"
               class="form-control"
               th:required="${field.required}"
               th:value="${entity != null ? entity.get(field.key) : ''}"/>

        <!-- Tipo textarea -->
        <textarea th:if="${field.type == 'textarea'}"
                  th:id="${field.key}"
                  th:name="${field.key}"
                  class="form-control"
                  rows="3"
                  th:required="${field.required}"
                  th:text="${entity != null ? entity.get(field.key) : ''}"></textarea>

        <!-- Tipo select -->
        <select th:if="${field.type == 'select'}"
                th:id="${field.key}"
                th:name="${field.key}"
                class="form-select"
                th:required="${field.required}">
            <option value="">-- Seleccione --</option>
            <option th:each="opt : ${field.options}"
                    th:value="${opt.value}"
                    th:text="${opt.label}"
                    th:selected="${entity != null
                                   and entity.get(field.key) != null
                                   and #strings.equals(#strings.toString(entity.get(field.key)), opt.value)}"></option>
        </select>

        <!-- Tipo multiselect -->
        <select th:if="${field.type == 'multiselect'}"
                th:id="${field.key}"
                th:name="${field.key}"
                class="form-select"
                multiple size="5"
                th:required="${field.required}">
            <option th:each="opt : ${field.options}"
                    th:value="${opt.value}"
                    th:text="${opt.label}"
                    th:selected="${entity != null
                                   and entity.get(field.key) != null
                                   and #lists.contains(entity.get(field.key), T(java.lang.Long).valueOf(opt.value))}"></option>
        </select>
        <small th:if="${field.type == 'multiselect'}" class="form-text text-muted">
            Ctrl+Click para seleccionar varios.
        </small>

        <!-- Tipo checkbox -->
        <div th:if="${field.type == 'checkbox'}" class="form-check">
            <input type="hidden" th:name="${field.key}" value="false"/>
            <input type="checkbox" class="form-check-input"
                   th:id="${field.key}"
                   th:name="${field.key}"
                   value="true"
                   th:checked="${entity != null and entity.get(field.key) == true}"/>
            <label class="form-check-label" th:for="${field.key}">Sí</label>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-end mt-3">
        <a th:href="@{${cancelUrl ?: entityPath ?: '/'}}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Cancelar
        </a>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i>
            <span th:text="${isEdit} ? 'Actualizar' : 'Crear'">Guardar</span>
        </button>
    </div>
</form>

</body>
</html>
