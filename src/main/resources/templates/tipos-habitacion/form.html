<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/tipos-habitacion}">Tipos de habitación</a></li>
            <li class="breadcrumb-item active" th:text="${editId != null} ? 'Editar' : 'Nuevo'">Nuevo</li>
        </ol>
    </nav>

    <div class="hp-page-header">
        <h1 class="hp-page-title" th:text="${editId != null} ? 'Editar tipo de habitación' : 'Nuevo tipo de habitación'">Tipo</h1>
    </div>

    <div class="card" style="max-width: 720px;">
        <div class="card-body p-4">
            <form th:action="${editId != null} ? @{/tipos-habitacion/{id}(id=${editId})} : @{/tipos-habitacion}"
                  th:object="${request}" method="post" novalidate>
                <div th:insert="~{fragments/campos :: input('nombre', 'Nombre', 'text', true)}"></div>
                <div th:insert="~{fragments/campos :: textarea('descripcion', 'Descripción', false)}"></div>
                <div class="row">
                    <div class="col-md-6" th:insert="~{fragments/campos :: numero('capacidadMaxima', 'Capacidad máxima (personas)', true, '1')}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: numero('precioBaseNoche', 'Precio base por noche (COP)', true, '0.01')}"></div>
                </div>
                <div th:insert="~{fragments/campos :: input('imagen', 'Imagen pública (ruta, ej. /img/tipos/junior-suite.jpg)', 'text', false)}"></div>
                <div th:insert="~{fragments/campos :: input('comodidades', 'Comodidades (separadas por coma)', 'text', false)}"></div>
                <p class="text-muted small">
                    La imagen y las comodidades se muestran en el portal público de reservas.
                </p>
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a th:href="@{/tipos-habitacion}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${editId != null} ? 'Guardar cambios' : 'Crear tipo'">Guardar</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
