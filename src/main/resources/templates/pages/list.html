<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${title}">Listado</title>
</head>
<body>

<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-0" th:text="${title}">Listado</h1>
            <small class="text-muted">Gestión de <span th:text="${entityName}">entidad</span></small>
        </div>
        <a th:href="@{${entityPath} + '/new'}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Nuevo
        </a>
    </div>

    <div th:replace="~{fragments/table :: table(${columns}, ${rows}, ${entityPath})}"></div>

</section>

</body>
</html>
