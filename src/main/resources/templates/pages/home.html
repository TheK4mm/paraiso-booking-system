<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${title}">Hotel Paraíso</title>
</head>
<body>

<section layout:fragment="content">

    <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border">
        <div class="container-fluid py-3">
            <h1 class="display-5 fw-bold">
                <i class="bi bi-buildings text-primary"></i> Hotel Paraíso
            </h1>
            <p class="col-md-10 fs-5 text-muted">
                Sistema integral de gestión de reservas. Administra clientes, habitaciones,
                empleados, servicios, reservas, pagos y facturas desde un único panel.
            </p>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="m : ${modules}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-primary" th:text="${m.name}">Módulo</h5>
                    <p class="card-text text-muted flex-grow-1" th:text="${m.description}">Descripción</p>
                    <a th:href="@{${m.path}}" class="btn btn-outline-primary mt-2">
                        Ver <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

</section>

</body>
</html>
