<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <div class="hp-page-header">
        <div>
            <h1 class="hp-page-title">Pagos</h1>
            <p class="hp-page-sub">Abonos y pagos totales asociados a las reservas</p>
        </div>
        <a th:href="@{/pagos/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Registrar pago
        </a>
    </div>

    <form class="hp-filters" method="get" th:action="@{/pagos}">
        <select name="estado" class="form-select" onchange="this.form.submit()">
            <option value="">Todos los estados</option>
            <option th:each="e : ${estados}" th:value="${e}" th:selected="${e == estado}"
                    th:text="${e.name() == 'APROBADO'} ? 'Aprobado' :
                             (${e.name() == 'PENDIENTE'} ? 'Pendiente' :
                             (${e.name() == 'RECHAZADO'} ? 'Rechazado' :
                             (${e.name() == 'REEMBOLSADO'} ? 'Reembolsado' : 'Cancelado')))">Estado</option>
        </select>
        <button type="submit" class="btn btn-outline-secondary">Filtrar</button>
        <a th:href="@{/pagos}" class="btn btn-link btn-sm text-muted">Limpiar</a>
        <a th:href="${'/pagos/export.csv' + queryBase}" class="btn btn-outline-secondary ms-auto">
            <i class="bi bi-download me-1"></i> CSV
        </a>
    </form>

    <div class="card">
        <div th:if="${page.totalElements == 0}"
             th:replace="~{fragments/estados :: vacio('bi-credit-card', 'Sin pagos',
                          'Registra el primer pago desde el detalle de una reserva.',
                          '/pagos/new', 'Registrar pago')}"></div>

        <div class="table-responsive" th:if="${page.totalElements > 0}">
            <table class="table hp-table align-middle">
                <thead>
                <tr>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'id', 'ID')}"></th>
                    <th>Reserva</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'monto', 'Monto')}"></th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'metodoPago', 'Método')}"></th>
                    <th>Referencia</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'fechaPago', 'Fecha')}"></th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'estadoPago', 'Estado')}"></th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${page.content}">
                    <td class="text-muted" th:text="'#' + ${p.id}">#1</td>
                    <td><a th:href="@{/reservas/{id}(id=${p.reservaId})}" class="hp-row-link"
                           th:text="${p.codigoReserva}">RES</a></td>
                    <td class="fw-semibold" th:text="${#numbers.formatDecimal(p.monto, 0, 'POINT', 0, 'COMMA')} + ' COP'">monto</td>
                    <td th:text="${metodoLabels[p.metodoPago.name()]}">método</td>
                    <td class="text-muted small" th:text="${p.referenciaTransaccion} ?: '—'">ref</td>
                    <td class="small" th:text="${#temporals.format(p.fechaPago, 'dd MMM yyyy HH:mm')}">fecha</td>
                    <td><span th:replace="~{fragments/badges :: pago(${p.estadoPago})}"></span></td>
                    <td class="text-end">
                        <a th:href="@{/pagos/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-secondary"
                           th:if="${p.estadoPago.name() == 'APROBADO' or p.estadoPago.name() == 'PENDIENTE'}"
                           title="Editar"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/pagos/{id}/delete(id=${p.id})}" method="post" class="d-inline"
                              th:if="${p.estadoPago.name() == 'APROBADO' or p.estadoPago.name() == 'PENDIENTE'}"
                              th:data-hp-confirm="|¿Cancelar el pago #${p.id} de la reserva ${p.codigoReserva}?|">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancelar">
                                <i class="bi bi-x-circle"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:replace="~{fragments/tabla :: paginacion(${page})}"></nav>
        <div th:replace="~{fragments/tabla :: total(${page})}"></div>
    </div>

</section>
</body>
</html>
