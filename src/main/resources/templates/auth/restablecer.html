<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Restablecer contraseña</title>
</head>
<body>
<section layout:fragment="content">
    <h1 class="h5 text-center mb-4">Nueva contraseña</h1>

    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/restablecer}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <div class="mb-3">
            <label for="password" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" id="password" name="password"
                   minlength="8" required autofocus autocomplete="new-password">
            <div class="form-text">Mínimo 8 caracteres.</div>
        </div>
        <div class="mb-3">
            <label for="confirmarPassword" class="form-label">Confirmar contraseña</label>
            <input type="password" class="form-control" id="confirmarPassword"
                   name="confirmarPassword" minlength="8" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Restablecer contraseña</button>
    </form>
</section>
</body>
</html>
