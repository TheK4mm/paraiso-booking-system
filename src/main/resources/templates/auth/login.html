<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Iniciar sesión</title>
</head>
<body>
<section layout:fragment="content">
    <h1 class="h5 text-center mb-1">Bienvenido de nuevo</h1>
    <p class="text-muted small text-center mb-4">Ingresa a tu cuenta para continuar</p>

    <div th:if="${param.error}" class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i> Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-info py-2 small">
        <i class="bi bi-box-arrow-right me-1"></i> Sesión cerrada correctamente.
    </div>
    <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Usuario o email</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus
                   autocomplete="username">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required
                   autocomplete="current-password">
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                <label class="form-check-label small" for="remember-me">Recordarme</label>
            </div>
            <a th:href="@{/recuperar}" class="small text-decoration-none">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
    </form>

    <p class="text-center small text-muted mt-4 mb-0">
        ¿No tienes cuenta? <a th:href="@{/registro}" class="text-decoration-none">Crear cuenta</a>
    </p>
</section>
</body>
</html>
