<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Verifica tu email</title>
</head>
<body>
<section layout:fragment="content">
    <div class="text-center mb-3">
        <i class="bi bi-envelope-check" style="font-size: 2.5rem; color: var(--hp-primary);"></i>
    </div>
    <h1 class="h5 text-center mb-1">Revisa tu correo</h1>
    <p class="text-muted small text-center mb-4">
        Te enviamos un enlace de verificación<span th:if="${email}"> a
        <strong th:text="${email}">email</strong></span>. Ábrelo para activar tu
        cuenta; es válido durante 24 horas.
    </p>

    <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/verificar-email/reenviar}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">¿No llegó? Reenvía el enlace</label>
            <input type="email" class="form-control" id="email" name="email"
                   th:value="${email}" placeholder="tu@email.com" required>
        </div>
        <button type="submit" class="btn btn-outline-primary w-100">Reenviar enlace</button>
    </form>

    <p class="text-center small text-muted mt-4 mb-0">
        <a th:href="@{/login}" class="text-decoration-none">Volver a iniciar sesión</a>
    </p>
</section>
</body>
</html>
