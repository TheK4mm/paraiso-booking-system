<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Recuperar contraseña</title>
</head>
<body>
<section layout:fragment="content">
    <h1 class="h5 text-center mb-1">Recuperar contraseña</h1>
    <p class="text-muted small text-center mb-4">
        Te enviaremos un enlace para restablecerla si el email está registrado.
    </p>

    <form th:action="@{/recuperar}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
    </form>

    <p class="text-center small text-muted mt-4 mb-0">
        <a th:href="@{/login}" class="text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
        </a>
    </p>
</section>
</body>
</html>
