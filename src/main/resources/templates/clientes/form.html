<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/clientes}">Clientes</a></li>
            <li class="breadcrumb-item active" th:text="${editId != null} ? 'Editar' : 'Nuevo'">Nuevo</li>
        </ol>
    </nav>

    <div class="hp-page-header">
        <h1 class="hp-page-title" th:text="${editId != null} ? 'Editar cliente' : 'Nuevo cliente'">Cliente</h1>
    </div>

    <div class="card" style="max-width: 860px;">
        <div class="card-body p-4">
            <form th:action="${editId != null} ? @{/clientes/{id}(id=${editId})} : @{/clientes}"
                  th:object="${request}" method="post" novalidate>
                <div class="row">
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('nombre', 'Nombre', 'text', true)}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('apellido', 'Apellido', 'text', true)}"></div>
                </div>
                <div class="row">
                    <div class="col-md-6"
                         th:insert="~{fragments/campos :: select('tipoDocumento', 'Tipo de documento', true, ${tiposDocumento}, null)}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('numeroDocumento', 'Número de documento', 'text', true)}"></div>
                </div>
                <div class="row">
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('email', 'Email', 'email', true)}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('telefono', 'Teléfono', 'text', false)}"></div>
                </div>
                <div class="row">
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('direccion', 'Dirección', 'text', false)}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: input('pais', 'País', 'text', false)}"></div>
                </div>
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${editId != null} ? 'Guardar cambios' : 'Crear cliente'">Guardar</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
