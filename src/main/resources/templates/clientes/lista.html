<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <div class="hp-page-header">
        <div>
            <h1 class="hp-page-title">Clientes</h1>
            <p class="hp-page-sub">Huéspedes registrados y sus datos de contacto</p>
        </div>
        <a th:href="@{/clientes/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Nuevo cliente
        </a>
    </div>

    <form class="hp-filters" method="get" th:action="@{/clientes}">
        <div class="hp-search">
            <i class="bi bi-search"></i>
            <input type="search" name="q" th:value="${q}" class="form-control"
                   placeholder="Buscar por nombre, documento o email…">
        </div>
        <div class="form-check" sec:authorize="hasRole('ADMIN')">
            <input class="form-check-input" type="checkbox" name="incluirInactivos" value="true"
                   id="incluirInactivos" th:checked="${incluirInactivos}" onchange="this.form.submit()">
            <label class="form-check-label small" for="incluirInactivos">Incluir inactivos</label>
        </div>
        <button type="submit" class="btn btn-outline-secondary">Filtrar</button>
        <a th:href="@{/clientes}" class="btn btn-link btn-sm text-muted">Limpiar</a>
        <a th:href="${'/clientes/export.csv' + queryBase}" class="btn btn-outline-secondary ms-auto">
            <i class="bi bi-download me-1"></i> CSV
        </a>
    </form>

    <div class="card">
        <th:block th:if="${page.totalElements == 0}">
            <div th:replace="~{fragments/estados :: vacio('bi-people', 'Sin clientes',
                              ${q != null and !#strings.isEmpty(q)} ? 'Ningún cliente coincide con la búsqueda.' : 'Registra tu primer cliente para empezar a crear reservas.',
                              '/clientes/new', 'Nuevo cliente')}"></div>
        </th:block>

        <div class="table-responsive" th:if="${page.totalElements > 0}">
            <table class="table hp-table align-middle">
                <thead>
                <tr>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'nombre', 'Cliente')}"></th>
                    <th>Documento</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'email', 'Email')}"></th>
                    <th>Teléfono</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'pais', 'País')}"></th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${page.content}">
                    <td>
                        <a th:href="@{/clientes/{id}/edit(id=${c.id})}" class="hp-row-link"
                           th:text="${c.nombreCompleto}">Nombre</a>
                    </td>
                    <td><span class="text-muted small" th:text="${c.tipoDocumento}"></span>
                        <span th:text="${c.numeroDocumento}"></span></td>
                    <td th:text="${c.email}">email</td>
                    <td th:text="${c.telefono} ?: '—'">tel</td>
                    <td th:text="${c.pais} ?: '—'">país</td>
                    <td><span th:replace="~{fragments/badges :: activo(${c.activo})}"></span></td>
                    <td class="text-end">
                        <a th:href="@{/clientes/{id}/edit(id=${c.id})}"
                           class="btn btn-sm btn-outline-secondary" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/clientes/{id}/delete(id=${c.id})}" method="post" class="d-inline"
                              th:data-hp-confirm="|¿Desactivar al cliente ${c.nombreCompleto}?|"
                              sec:authorize="hasRole('ADMIN')" th:if="${c.activo}">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Desactivar">
                                <i class="bi bi-person-dash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:replace="~{fragments/tabla :: paginacion(${page})}"></nav>
        <div th:replace="~{fragments/tabla :: total(${page})}"></div>
    </div>

</section>
</body>
</html>
