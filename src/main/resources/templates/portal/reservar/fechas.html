<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public}">
<head>
    <title>Reservar</title>
</head>
<body>
<section layout:fragment="content">
    <div class="hp-wizard">
        <div th:replace="~{fragments/wizard :: pasos(${paso})}"></div>

        <div class="text-center mb-4">
            <h1 class="hp-section-title">¿Cuándo nos visitas?</h1>
            <p class="hp-section-sub mx-auto">
                Elige tus fechas y te mostraremos las habitaciones disponibles al instante.
            </p>
        </div>

        <div class="hp-search-bar mx-auto" style="max-width: 760px;">
            <form th:action="@{/reservar/disponibilidad}" th:object="${busqueda}" method="get" novalidate>
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="fechaEntrada" class="form-label">Llegada</label>
                        <input type="date" class="form-control" th:field="*{fechaEntrada}"
                               th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                               th:classappend="${#fields.hasErrors('fechaEntrada')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{fechaEntrada}">Error</div>
                    </div>
                    <div class="col-md-4">
                        <label for="fechaSalida" class="form-label">Salida</label>
                        <input type="date" class="form-control" th:field="*{fechaSalida}"
                               th:classappend="${#fields.hasErrors('fechaSalida')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{fechaSalida}">Error</div>
                    </div>
                    <div class="col-md-2">
                        <label for="huespedes" class="form-label">Huéspedes</label>
                        <input type="number" min="1" max="20" class="form-control" th:field="*{huespedes}"
                               th:classappend="${#fields.hasErrors('huespedes')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{huespedes}">Error</div>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>Buscar
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <p class="text-center text-muted small mt-4">
            <i class="bi bi-shield-check me-1"></i>
            Sin pagos por adelantado: confirmas tu reserva y pagas en el hotel.
        </p>
    </div>
</section>
</body>
</html>
