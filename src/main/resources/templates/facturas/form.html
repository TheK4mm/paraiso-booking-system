<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/facturas}">Facturas</a></li>
            <li class="breadcrumb-item active" th:text="${editId != null} ? 'Editar' : 'Generar'">Generar</li>
        </ol>
    </nav>

    <div class="hp-page-header">
        <h1 class="hp-page-title" th:text="${editId != null} ? 'Editar factura' : 'Generar factura'">Factura</h1>
    </div>

    <div class="card" style="max-width: 720px;">
        <div class="card-body p-4">
            <form th:action="${editId != null} ? @{/facturas/{id}(id=${editId})} : @{/facturas}"
                  th:object="${request}" method="post" novalidate>
                <div class="mb-3">
                    <label for="reservaId" class="form-label">Reserva a facturar <span class="hp-required">*</span></label>
                    <select th:field="*{reservaId}" class="form-select" th:disabled="${editId != null}"
                            th:classappend="${#fields.hasErrors('reservaId')} ? 'is-invalid'">
                        <option value="">— Seleccione —</option>
                        <option th:each="res : ${reservas}" th:value="${res.id}"
                                th:text="|${res.codigoReserva} · ${res.clienteNombreCompleto} · ${#numbers.formatDecimal(res.precioTotal, 0, 'POINT', 0, 'COMMA')} COP|">Res</option>
                    </select>
                    <input type="hidden" th:if="${editId != null}" th:field="*{reservaId}">
                    <div class="form-text">Solo se pueden facturar reservas confirmadas, en check-in o check-out.</div>
                    <div class="invalid-feedback" th:errors="*{reservaId}">Error</div>
                </div>
                <div class="row">
                    <div class="col-md-6" th:insert="~{fragments/campos :: numero('descuento', 'Descuento (COP)', false, '0.01')}"></div>
                    <div class="col-md-6" th:insert="~{fragments/campos :: numero('impuestoPorcentaje', 'IVA % (19 por defecto)', false, '0.01')}"></div>
                </div>
                <div th:insert="~{fragments/campos :: textarea('notas', 'Notas', false)}"></div>
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a th:href="@{/facturas}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${editId != null} ? 'Guardar cambios' : 'Generar factura'">Guardar</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
