<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<body>
<section layout:fragment="content">

    <div class="hp-page-header">
        <div>
            <h1 class="hp-page-title">Reservas</h1>
            <p class="hp-page-sub">Operación central: estancias, estados y ocupación</p>
        </div>
        <a th:href="@{/reservas/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Nueva reserva
        </a>
    </div>

    <form class="hp-filters" method="get" th:action="@{/reservas}">
        <div class="hp-search">
            <i class="bi bi-search"></i>
            <input type="search" name="q" th:value="${q}" class="form-control"
                   placeholder="Código o cliente…">
        </div>
        <select name="estado" class="form-select" onchange="this.form.submit()">
            <option value="">Todos los estados</option>
            <option th:each="e : ${estados}" th:value="${e}" th:selected="${e == estado}"
                    th:text="${e.name() == 'PENDIENTE'} ? 'Pendiente' :
                             (${e.name() == 'CONFIRMADA'} ? 'Confirmada' :
                             (${e.name() == 'CHECKIN'} ? 'Check-in' :
                             (${e.name() == 'CHECKOUT'} ? 'Check-out' :
                             (${e.name() == 'CANCELADA'} ? 'Cancelada' : 'No-show'))))">Estado</option>
        </select>
        <div>
            <label class="form-label small text-muted mb-1">Entrada desde</label>
            <input type="date" name="desde" th:value="${desde}" class="form-control" onchange="this.form.submit()">
        </div>
        <div>
            <label class="form-label small text-muted mb-1">Entrada hasta</label>
            <input type="date" name="hasta" th:value="${hasta}" class="form-control" onchange="this.form.submit()">
        </div>
        <button type="submit" class="btn btn-outline-secondary">Filtrar</button>
        <a th:href="@{/reservas}" class="btn btn-link btn-sm text-muted">Limpiar</a>
        <a th:href="${'/reservas/export.csv' + queryBase}" class="btn btn-outline-secondary ms-auto">
            <i class="bi bi-download me-1"></i> CSV
        </a>
    </form>

    <div class="card">
        <div th:if="${page.totalElements == 0}"
             th:replace="~{fragments/estados :: vacio('bi-calendar-x', 'Sin reservas',
                          'No hay reservas que coincidan con los filtros.',
                          '/reservas/new', 'Nueva reserva')}"></div>

        <div class="table-responsive" th:if="${page.totalElements > 0}">
            <table class="table hp-table align-middle">
                <thead>
                <tr>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'codigoReserva', 'Código')}"></th>
                    <th>Cliente</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'fechaEntrada', 'Entrada')}"></th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'fechaSalida', 'Salida')}"></th>
                    <th>Noches</th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'precioTotal', 'Total')}"></th>
                    <th th:replace="~{fragments/tabla :: th(${page}, 'estado', 'Estado')}"></th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${page.content}">
                    <td><a th:href="@{/reservas/{id}(id=${res.id})}" class="hp-row-link"
                           th:text="${res.codigoReserva}">RES</a></td>
                    <td>
                        <div th:text="${res.clienteNombreCompleto}">Cliente</div>
                        <div class="text-muted small" th:text="${res.clienteDocumento}">doc</div>
                    </td>
                    <td th:text="${#temporals.format(res.fechaEntrada, 'dd MMM yyyy')}">entrada</td>
                    <td th:text="${#temporals.format(res.fechaSalida, 'dd MMM yyyy')}">salida</td>
                    <td><span th:text="${res.totalNoches}"></span>
                        <span class="text-muted small" th:text="'· ' + ${res.numeroHuespedes} + ' pax'"></span></td>
                    <td class="fw-semibold" th:text="${#numbers.formatDecimal(res.precioTotal, 0, 'POINT', 0, 'COMMA')} + ' COP'">total</td>
                    <td><span th:replace="~{fragments/badges :: reserva(${res.estado})}"></span></td>
                    <td class="text-end">
                        <a th:href="@{/reservas/{id}(id=${res.id})}" class="btn btn-sm btn-outline-secondary"
                           title="Ver detalle"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:replace="~{fragments/tabla :: paginacion(${page})}"></nav>
        <div th:replace="~{fragments/tabla :: total(${page})}"></div>
    </div>

</section>
</body>
</html>
