<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} != null ? ${title} + ' — Hotel Paraíso' : 'Hotel Paraíso'">Hotel Paraíso</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap-icons/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<!--
  Tarjeta centrada sobre fondo oscuro. La usan las páginas de error: la
  autenticación ya no tiene páginas propias (vive en el modal del portal,
  ver fragments/auth.html), de ahí que este layout ya no se llame "auth".
-->
<body>
<div class="hp-auth">
    <div class="hp-auth-card">
        <div class="hp-auth-brand">
            <i class="bi bi-buildings-fill"></i> Hotel Paraíso
        </div>
        <section layout:fragment="content">
            <p>Contenido</p>
        </section>
    </div>
</div>
<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
