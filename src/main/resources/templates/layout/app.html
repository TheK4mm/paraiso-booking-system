<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} != null ? ${title} + ' — Hotel Paraíso' : 'Hotel Paraíso'">Hotel Paraíso</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap-icons/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <!-- Restaura el estado del menú lateral ANTES del primer pintado: si se
         hiciera desde app.js (al final del body) la página se vería un instante
         con el menú desplegado en cada navegación. -->
    <script th:inline="none">
        (function () {
            try {
                if (localStorage.getItem('hp-sidebar') === 'oculto') {
                    document.documentElement.classList.add('hp-sidebar-oculto');
                }
            } catch (e) { /* almacenamiento no disponible: menú desplegado */ }
        })();
    </script>
</head>
<body>
<div class="hp-layout">

    <!-- ─── Sidebar ─────────────────────────────────────────────── -->
    <aside class="hp-sidebar" id="hpSidebar">
        <a class="hp-brand" th:href="@{/}">
            <i class="bi bi-buildings-fill"></i> Hotel Paraíso
        </a>
        <nav class="hp-nav">
            <div class="hp-nav-section">Operación</div>
            <a class="hp-nav-link" th:href="@{/dashboard}"
               th:classappend="${currentPath == '/' or #strings.startsWith(currentPath, '/dashboard')} ? 'active'">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
            <a class="hp-nav-link" th:href="@{/reservas}"
               th:classappend="${#strings.startsWith(currentPath, '/reservas') and !#strings.startsWith(currentPath, '/reservas/calendario')} ? 'active'">
                <i class="bi bi-calendar-check"></i> Reservas
            </a>
            <a class="hp-nav-link" th:href="@{/reservas/calendario}"
               th:classappend="${#strings.startsWith(currentPath, '/reservas/calendario')} ? 'active'">
                <i class="bi bi-calendar3"></i> Calendario
            </a>
            <a class="hp-nav-link" th:href="@{/pagos}"
               th:classappend="${#strings.startsWith(currentPath, '/pagos')} ? 'active'">
                <i class="bi bi-credit-card"></i> Pagos
            </a>
            <a class="hp-nav-link" th:href="@{/facturas}"
               th:classappend="${#strings.startsWith(currentPath, '/facturas')} ? 'active'">
                <i class="bi bi-receipt"></i> Facturas
            </a>

            <div class="hp-nav-section">Gestión</div>
            <a class="hp-nav-link" th:href="@{/clientes}"
               th:classappend="${#strings.startsWith(currentPath, '/clientes')} ? 'active'">
                <i class="bi bi-people"></i> Clientes
            </a>
            <a class="hp-nav-link" th:href="@{/habitaciones}"
               th:classappend="${#strings.startsWith(currentPath, '/habitaciones')} ? 'active'">
                <i class="bi bi-door-open"></i> Habitaciones
            </a>
            <a class="hp-nav-link" th:href="@{/tipos-habitacion}"
               th:classappend="${#strings.startsWith(currentPath, '/tipos-habitacion')} ? 'active'">
                <i class="bi bi-columns-gap"></i> Tipos de Habitación
            </a>
            <a class="hp-nav-link" th:href="@{/servicios}"
               th:classappend="${#strings.startsWith(currentPath, '/servicios')} ? 'active'">
                <i class="bi bi-stars"></i> Servicios
            </a>

            <th:block sec:authorize="hasRole('ADMIN')">
                <div class="hp-nav-section">Administración</div>
                <a class="hp-nav-link" th:href="@{/empleados}"
                   th:classappend="${#strings.startsWith(currentPath, '/empleados')} ? 'active'">
                    <i class="bi bi-person-badge"></i> Empleados
                </a>
                <a class="hp-nav-link" th:href="@{/usuarios}"
                   th:classappend="${#strings.startsWith(currentPath, '/usuarios')} ? 'active'">
                    <i class="bi bi-shield-lock"></i> Usuarios
                </a>
                <a class="hp-nav-link" th:href="@{/actividad}"
                   th:classappend="${#strings.startsWith(currentPath, '/actividad')} ? 'active'">
                    <i class="bi bi-clock-history"></i> Actividad
                </a>
            </th:block>
        </nav>
        <div class="hp-sidebar-footer">
            Hotel Paraíso · v2.0
        </div>
    </aside>
    <div class="hp-backdrop" id="hpBackdrop"></div>

    <!-- ─── Contenido ───────────────────────────────────────────── -->
    <div class="hp-main">
        <header class="hp-topbar">
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-secondary btn-toggle-sidebar" id="hpSidebarToggle"
                        type="button" aria-controls="hpSidebar" aria-expanded="true"
                        aria-label="Contraer menú" title="Contraer menú">
                    <i class="bi bi-list"></i>
                </button>
                <span class="fw-semibold" th:text="${title}">Página</span>
            </div>
            <div class="dropdown">
                <button class="hp-user-chip border-0" data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="hp-user-avatar"
                          th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">A</span>
                    <span class="small fw-medium" sec:authentication="name">usuario</span>
                    <i class="bi bi-chevron-down small text-muted"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                    <li class="dropdown-header">
                        <span sec:authorize="hasRole('ADMIN')" class="hp-badge hp-badge-primary">Administrador</span>
                        <span sec:authorize="hasRole('RECEPCIONISTA')" class="hp-badge hp-badge-info">Recepcionista</span>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </header>

        <main class="hp-content">
            <section layout:fragment="content">
                <p>Contenido</p>
            </section>
        </main>
    </div>
</div>

<!-- ─── Toasts flash ────────────────────────────────────────────── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div th:if="${success}" class="toast align-items-center text-bg-success border-0" data-hp-autoshow>
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    <div th:if="${error}" class="toast align-items-center text-bg-danger border-0" data-hp-autoshow>
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    <div th:if="${info}" class="toast align-items-center text-bg-primary border-0" data-hp-autoshow>
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-info-circle me-2"></i><span th:text="${info}"></span></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- ─── Modal de confirmación genérico ──────────────────────────── -->
<div class="modal fade" id="hpConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                <i class="bi bi-exclamation-circle text-warning" style="font-size: 2.2rem;"></i>
                <p class="mt-3 mb-0 fw-medium" data-hp-confirm-message>¿Confirmas esta operación?</p>
            </div>
            <div class="modal-footer border-0 pt-0 justify-content-center">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-sm btn-danger" data-hp-confirm-ok>Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
