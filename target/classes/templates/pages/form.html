<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${title}">Formulario</title>
</head>
<body>

<section layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Inicio</a></li>
            <li class="breadcrumb-item"><a th:href="@{${entityPath}}" th:text="${entityName}">Entidad</a></li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${isEdit} ? 'Editar' : 'Nuevo'">Acción</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4">
        <i class="bi" th:classappend="${isEdit} ? 'bi-pencil-square' : 'bi-plus-square'"></i>
        <span th:text="${title}">Formulario</span>
    </h1>

    <div th:replace="~{fragments/form :: form(${fields}, ${entity}, ${action}, ${isEdit})}"></div>

</section>

</body>
</html>
